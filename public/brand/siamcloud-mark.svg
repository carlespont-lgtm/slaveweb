<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SIAM Cloud">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d39e" />
      <stop offset="0.45" stop-color="#16bd95" />
      <stop offset="1" stop-color="#0f3a5f" />
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30" />
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0" />
