<svg viewBox="0 0 560 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Infraestructura, xarxes i comunicacions">
  <defs>
    <linearGradient id="sh-srv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d39e"/>
      <stop offset="1" stop-color="#0c7d68"/>
    </linearGradient>
    <linearGradient id="sh-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- líneas de conexión -->
  <g stroke="#34d39e" stroke-width="2.5" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M280 250 L140 120"/>
    <path d="M280 250 L430 120"/>
    <path d="M280 250 L140 380"/>
    <path d="M280 250 L430 380"/>
  </g>
  <g fill="#34d39e">
    <circle cx="140" cy="120" r="4"/><circle cx="430" cy="120" r="4"/>
    <circle cx="140" cy="380" r="4"/><circle cx="430" cy="380" r="4"/>
  </g>

  <!-- servidor central -->
  <g>
    <rect x="228" y="196" width="104" height="112" rx="14" fill="url(#sh-srv)"/>
    <rect x="228" y="196" width="104" height="112" rx="14" fill="url(#sh-glass)"/>
    <g fill="#ffffff" opacity="0.92">
      <rect x="242" y="212" width="76" height="10" rx="4"/>
      <rect x="242" y="232" width="76" height="10" rx="4"/>
      <rect x="242" y="252" width="76" height="10" rx="4"/>
    </g>
    <circle cx="250" cy="288" r="4" fill="#bef264"/>
    <circle cx="264" cy="288" r="4" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- node: monitor (dalt esq) -->
  <g transform="translate(96,74)">
    <rect x="0" y="0" width="88" height="70" rx="12" fill="url(#sh-glass)" stroke="#ffffff" stroke-opacity="0.25"/>
    <rect x="14" y="14" width="60" height="34" rx="4" fill="#34d39e" opacity="0.85"/>
    <rect x="34" y="52" width="20" height="6" rx="3" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- node: wifi/router (dalt dreta) -->
  <g transform="translate(384,74)" stroke="#ffffff" fill="none" stroke-linecap="round">
    <rect x="0" y="0" width="92" height="70" rx="12" fill="url(#sh-glass)" stroke-opacity="0.25" stroke-width="1"/>
    <g stroke="#bef264" stroke-width="3" transform="translate(46,44)">
      <circle cx="0" cy="0" r="3" fill="#bef264" stroke="none"/>
      <path d="M-10 -6 a12 12 0 0 1 20 0"/>
      <path d="M-18 -13 a24 24 0 0 1 36 0"/>
    </g>
  </g>

  <!-- node: telèfon IP (baix esq) -->
  <g transform="translate(96,336)">
    <rect x="0" y="0" width="88" height="70" rx="12" fill="url(#sh-glass)" stroke="#ffffff" stroke-opacity="0.25"/>
    <g transform="translate(30,18)" fill="none" stroke="#34d39e" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 2 H12 L15 10 L10 13 a14 14 0 0 0 7 7 L20 15 L28 18 V26 a3 3 0 0 1 -3 3 A24 24 0 0 1 1 5 A3 3 0 0 1 4 2 Z"/>
    </g>
  </g>

  <!-- node: núvol (baix dreta) -->
  <g transform="translate(384,336)">
    <rect x="0" y="0" width="92" height="70" rx="12" fill="url(#sh-glass)" stroke="#ffffff" stroke-opacity="0.25"/>
    <path d="M30 46 h34 a10 10 0 0 0 1.2 -19.9 A14 14 0 0 0 38 22 a9.5 9.5 0 0 0 -8 18.5 Z" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
