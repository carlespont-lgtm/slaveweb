<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Especies botánicas vinculadas a los artículos, con botón de pasaporte">
  <defs>
    <filter id="fsh2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0e6354" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="760" height="480" fill="#ecfdf5"/>
  <rect x="40" y="28" width="680" height="424" rx="16" fill="#ffffff" stroke="#d8e0e6" filter="url(#fsh2)"/>
  <path d="M40 44 a16 16 0 0 1 16 -16 h648 a16 16 0 0 1 16 16 v26 h-680 z" fill="#0d9e80"/>
  <circle cx="64" cy="44" r="5" fill="#ffffff" opacity="0.85"/>
  <circle cx="82" cy="44" r="5" fill="#ffffff" opacity="0.6"/>
  <circle cx="100" cy="44" r="5" fill="#ffffff" opacity="0.45"/>
  <text x="380" y="49" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Fitoware · Espècies botàniques</text>

  <!-- ficha artículo con especie enlazada -->
  <text x="60" y="98" fill="#0f172a" font-size="14" font-weight="700">Artículo · FLOR-OLIVO</text>
  <text x="688" y="98" text-anchor="end" fill="#64748b" font-size="11.5">Olivo ornamental en maceta 30L</text>

  <text x="60" y="128" fill="#64748b" font-size="11">Espècie botànica</text>
  <rect x="60" y="134" width="360" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="74" y="156" fill="#0d9e80" font-size="12.5" font-weight="700" text-decoration="underline" font-style="italic">Olea europaea</text>
  <path d="M396 145 h10 v10 M406 145 l-12 12" stroke="#0d9e80" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="430" y="156" fill="#94a3b8" font-size="10.5">enllaç a la fitxa de l’espècie →</text>

  <!-- botón pasaporte -->
  <rect x="500" y="100" width="200" height="38" rx="9" fill="#0d9e80"/>
  <path d="M520 113 c-6 4 -6 12 0 16 c6 -4 6 -12 0 -16 M520 113 v16" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="612" y="124" text-anchor="middle" fill="#ffffff" font-size="12.5" font-weight="700">Pasaporte fitosanitario</text>

  <line x1="60" y1="186" x2="700" y2="186" stroke="#eef2f6"/>

  <!-- pestaña especies -->
  <text x="60" y="210" fill="#0f172a" font-size="13" font-weight="700">Catàleg d'espècies</text>

  <rect x="60" y="222" width="640" height="28" rx="6" fill="#f1f5f9"/>
  <text x="74" y="240" fill="#475569" font-size="10.5" font-weight="600">CODI</text>
  <text x="160" y="240" fill="#475569" font-size="10.5" font-weight="600">NOMBRE CIENTÍFICO (A)</text>
  <text x="400" y="240" fill="#475569" font-size="10.5" font-weight="600">FAMÍLIA</text>
  <text x="560" y="240" fill="#475569" font-size="10.5" font-weight="600">PASAPORTE</text>
  <text x="688" y="240" fill="#475569" font-size="10.5" font-weight="600" text-anchor="end">ARTICLES</text>

  <g font-size="11.5" fill="#334155">
    <rect x="60" y="254" width="640" height="32" rx="6" fill="#ecfdf5"/>
    <text x="74" y="274" font-weight="600">9003</text>
    <text x="160" y="274" font-style="italic">Olea europaea</text>
    <text x="400" y="274">Oleaceae</text>
    <rect x="560" y="262" width="64" height="18" rx="9" fill="#d0fbe7"/>
    <text x="592" y="275" text-anchor="middle" fill="#0c7d68" font-size="10" font-weight="700">Requereix</text>
    <text x="688" y="274" text-anchor="end">3</text>

    <text x="74" y="310" font-weight="600">9001</text>
    <text x="160" y="310" font-style="italic">Rosa × hybrida</text>
    <text x="400" y="310">Rosaceae</text>
    <rect x="560" y="298" width="64" height="18" rx="9" fill="#d0fbe7"/>
    <text x="592" y="311" text-anchor="middle" fill="#0c7d68" font-size="10" font-weight="700">Requereix</text>
    <text x="688" y="310" text-anchor="end">5</text>
    <line x1="60" y1="322" x2="700" y2="322" stroke="#eef2f6"/>

    <text x="74" y="346" font-weight="600">9002</text>
    <text x="160" y="346" font-style="italic">Ocimum basilicum</text>
    <text x="400" y="346">Lamiaceae</text>
    <rect x="560" y="334" width="48" height="18" rx="9" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="584" y="347" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700">No</text>
    <text x="688" y="346" text-anchor="end">2</text>
    <line x1="60" y1="358" x2="700" y2="358" stroke="#eef2f6"/>

    <text x="74" y="382" font-weight="600">9005</text>
    <text x="160" y="382" font-style="italic">Pelargonium × hortorum</text>
    <text x="400" y="382">Geraniaceae</text>
    <rect x="560" y="370" width="64" height="18" rx="9" fill="#d0fbe7"/>
    <text x="592" y="383" text-anchor="middle" fill="#0c7d68" font-size="10" font-weight="700">Requereix</text>
    <text x="688" y="382" text-anchor="end">4</text>
  </g>

  <!-- pie -->
  <line x1="60" y1="402" x2="700" y2="402" stroke="#eef2f6"/>
  <circle cx="70" cy="424" r="3" fill="#0d9e80"/>
  <text x="84" y="428" fill="#64748b" font-size="11">Cada espècie enllaça amb els seus articles i, a l’inrevés, cada article enllaça amb la seva espècie.</text>
</svg>
