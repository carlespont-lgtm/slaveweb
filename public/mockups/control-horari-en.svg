<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Portal de fichaje del empleado con cronómetro en vivo y sello de inmutabilidad">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0e6354" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- fondo -->
  <rect width="760" height="480" fill="#ecfdf5"/>

  <!-- ventana app -->
  <rect x="40" y="28" width="680" height="424" rx="16" fill="#ffffff" stroke="#d8e0e6" filter="url(#sh)"/>

  <!-- barra superior -->
  <path d="M40 44 a16 16 0 0 1 16 -16 h648 a16 16 0 0 1 16 16 v26 h-680 z" fill="#0d9e80"/>
  <circle cx="64" cy="44" r="5" fill="#ffffff" opacity="0.85"/>
  <circle cx="82" cy="44" r="5" fill="#ffffff" opacity="0.6"/>
  <circle cx="100" cy="44" r="5" fill="#ffffff" opacity="0.45"/>
  <text x="380" y="49" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Time tracking · Clock-in</text>

  <!-- cabecera empleado -->
  <circle cx="74" cy="100" r="14" fill="#d0fbe7"/>
  <path d="M74 94 a5 5 0 1 1 0 10 a5 5 0 1 1 0 -10 M66 108 a8 6 0 0 1 16 0 z" fill="#0d9e80"/>
  <text x="98" y="97" fill="#0f172a" font-size="15" font-weight="700">María López · Operaria</text>
  <text x="98" y="114" fill="#64748b" font-size="11.5">Lunes 21/06/2026 · Jornada en curso</text>

  <!-- pill estado "en curso" -->
  <rect x="586" y="89" width="114" height="24" rx="12" fill="#ecfdf5" stroke="#0d9e80"/>
  <circle cx="604" cy="101" r="5" fill="#0d9e80"/>
  <text x="616" y="105" fill="#0c7d68" font-size="11.5" font-weight="600">In progress</text>

  <!-- tarjeta cronómetro -->
  <rect x="60" y="134" width="640" height="150" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="380" y="164" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5">EFFECTIVE TIME TODAY</text>
  <text x="380" y="228" text-anchor="middle" fill="#0f172a" font-size="62" font-weight="800" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="2">03:42:18</text>
  <text x="380" y="262" text-anchor="middle" fill="#94a3b8" font-size="12">Entrada 08:05 · Pausa 00:23 · Bruto 04:05</text>

  <!-- botones de acción -->
  <rect x="60" y="300" width="300" height="46" rx="10" fill="#e11d48"/>
  <path d="M86 315 v16 M86 331 h13 M95 326 l6 -3 -6 -3" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="216" y="328" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Clock out</text>

  <rect x="372" y="300" width="150" height="46" rx="10" fill="#ffffff" stroke="#0d9e80"/>
  <rect x="438" y="315" width="5" height="16" rx="2" fill="#0d9e80"/>
  <rect x="448" y="315" width="5" height="16" rx="2" fill="#0d9e80"/>
  <text x="408" y="328" text-anchor="middle" fill="#0c7d68" font-size="13.5" font-weight="700">Pausa</text>

  <rect x="534" y="300" width="166" height="46" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="552" y="328" fill="#475569" font-size="12.5">Proyecto: Obra Sant Joan</text>
  <path d="M682 320 l5 5 5 -5" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- totales hoy / semana / mes -->
  <g>
    <rect x="60" y="360" width="200" height="52" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="76" y="382" fill="#64748b" font-size="11">Hoy</text>
    <text x="76" y="402" fill="#0f172a" font-size="17" font-weight="800">3h 42m</text>

    <rect x="280" y="360" width="200" height="52" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="296" y="382" fill="#64748b" font-size="11">This week</text>
    <text x="296" y="402" fill="#0f172a" font-size="17" font-weight="800">21h 10m</text>

    <rect x="500" y="360" width="200" height="52" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="516" y="382" fill="#64748b" font-size="11">This month</text>
    <text x="516" y="402" fill="#0f172a" font-size="17" font-weight="800">92h 05m</text>
  </g>

  <!-- badge sello inmutable -->
  <rect x="60" y="424" width="640" height="26" rx="8" fill="#ecfdf5"/>
  <path d="M77 428 l9 2.6 v5.4 c0 4.6 -4.5 7.2 -9 9 c-4.5 -1.8 -9 -4.4 -9 -9 v-5.4 z" fill="#0d9e80"/>
  <path d="M73.5 436 l2.4 2.4 4.3 -4.6" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="98" y="441" fill="#0c7d68" font-size="11.5" font-weight="600">Sealed clock-in · chained HMAC-SHA256 · immutable (art. 34.9 ET)</text>
</svg>
